[fan]
pin: EBBCan:gpio13

[heater_fan hotend_fan]
pin: EBBCan:gpio14
heater: extruder
heater_temp: 70.0

[fan_generic nevermore]
pin: PF8
kick_start_time: 0.5
off_below: 0.10

[temperature_fan mcu]
pin: PA6
tachometer_pin: PC2
tachometer_ppr: 2
sensor_type: temperature_mcu
control: pid
pid_Kp: 1.0
pid_Ki: 0.5
pid_Kd: 2.0
min_temp: 0
max_temp: 100
target_temp: 48.0
min_speed: 0.0
max_speed: 0.8
off_below: 0.20

[temperature_fan SoC]
pin: PA2
tachometer_pin: PC1
tachometer_ppr: 2
sensor_type: temperature_host
control: pid
pid_Kp: 1.0
pid_Ki: 0.5
pid_Kd: 2.0
min_temp: 0
max_temp: 100
target_temp: 52.0
min_speed: 0.0
max_speed: 0.8
off_below: 0.20

[fan_generic exhaust_fan]
pin: PF7
max_power: 1.0
shutdown_speed: 0.0
kick_start_time: 0.5