[fan]
pin: EBBCan:gpio13

[heater_fan hotend_fan]
pin: EBBCan:gpio14
heater: extruder
heater_temp: 70.0

[fan_generic nevermore]
pin: PF8
kick_start_time: 0.5
off_below: 0.10

[temperature_fan mcu]
pin: PA6
tachometer_pin: PC1
tachometer_ppr: 2
sensor_type: temperature_mcu
min_temp: 0
max_temp: 100
target_temp: 45
control: pid
pid_Kp: 2
pid_Ki: 5
pid_Kd: 0.5
min_speed: 0.15
max_speed: 1.0
off_below: 0.10


[temperature_fan SoC]
pin: PA2
tachometer_pin: PC2
tachometer_ppr: 2
sensor_type: temperature_host
min_temp: 0
max_temp: 100
target_temp: 50
control: pid
pid_Kp: 2
pid_Ki: 5
pid_Kd: 0.5
min_speed: 0.15
max_speed: 1.0
off_below: 0.10


[fan_generic exhaust_fan]
pin: PF7
max_power: 1.0
shutdown_speed: 0.0
kick_start_time: 0.5